baseURL: "https://saascompass.co/"
languageCode: "en-us"
title: "SaaS Compass"
theme: "PaperMod"
pagination:
  pagerSize: 10

params:
  env: production
  title: SaaS Compass
  description: "Independent reviews of CRM, email marketing, HR, and business SaaS tools. Cut through the noise and choose the right software."
  keywords: [SaaS reviews 2026, best CRM, email marketing software, project management tools, business software comparison]
  author: SaaS Compass Team
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: false
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: "Stop guessing. Start with the right SaaS."
    Content: >
      Independent, hands-on reviews of business software — CRM, email marketing,
      HR tools, and more. No sponsored placements. Just honest comparisons for 2026.

  socialIcons:
    - name: "rss"
      url: "/index.xml"

menu:
  main:
    - identifier: crm
      name: CRM
      url: /tags/crm/
      weight: 10
    - identifier: email
      name: Email Marketing
      url: /tags/email-marketing/
      weight: 20
    - identifier: pm
      name: Project Mgmt
      url: /tags/project-management/
      weight: 30
    - identifier: reviews
      name: All Reviews
      url: /categories/review/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true